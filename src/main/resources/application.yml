spring:
  application:
    name: rule-engine

  threads:
    virtual:
      enabled: true

  # Kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    streams:
      application-id: rule-engine
      properties:
        default.key.serde: org.apache.kafka.common.serialization.Serdes$StringSerde
        default.value.serde: io.confluent.kafka.streams.serdes.avro.SpecificAvroSerde
        schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8081}
        # Commit interval for stateful processing
        commit.interval.ms: 1000
        # State store directory
        state.dir: ${STATE_DIR:/tmp/kafka-streams}

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# Server (for actuator only - no REST API)
server:
  port: 8083

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

# SentinelPay config
sentinelpay:
  kafka:
    topics:
      transaction-events: transaction-events
      decision-events: decision-events
  rules:
    # Amount threshold in USD
    max-transaction-amount: 10000.00
    # Velocity window in seconds
    velocity-window-seconds: 3600
    # Max transactions per account in velocity window
    max-transactions-per-window: 5
    # High risk country codes
    high-risk-countries: IR,KP,SY